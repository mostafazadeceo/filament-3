openapi: 3.0.3
info:
  title: مستندات ای‌پی‌آی Filamat IAM Suite
  version: v1
servers:
  - url: /api/v1
security:
  - bearerAuth: []
  - apiKeyAuth: []
paths:
  /tenants:
    get:
      summary: لیست فضاهای کاری
      responses:
        '200': { description: موفق }
    post:
      summary: ایجاد فضای کاری
      responses:
        '201': { description: Created }
  /tenants/{id}:
    get:
      summary: نمایش فضای کاری
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200': { description: موفق }
    patch:
      summary: ویرایش فضای کاری
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200': { description: موفق }
    delete:
      summary: حذف فضای کاری
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200': { description: موفق }
  /users:
    get:
      summary: لیست کاربران
      responses:
        '200': { description: موفق }
    post:
      summary: ایجاد کاربر
      responses:
        '201': { description: Created }
  /users/{id}:
    get:
      summary: نمایش کاربر
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200': { description: موفق }
    patch:
      summary: ویرایش کاربر
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200': { description: موفق }
    delete:
      summary: حذف کاربر
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200': { description: موفق }
  /roles:
    get:
      summary: لیست نقش‌ها
      responses:
        '200': { description: موفق }
    post:
      summary: ایجاد نقش
      responses:
        '201': { description: Created }
  /permissions:
    get:
      summary: لیست مجوزها
      responses:
        '200': { description: موفق }
    post:
      summary: ایجاد مجوز
      responses:
        '201': { description: Created }
  /groups:
    get:
      summary: لیست گروه‌ها
      responses:
        '200': { description: موفق }
    post:
      summary: ایجاد گروه
      responses:
        '201': { description: Created }
  /wallets:
    get:
      summary: لیست کیف پول‌ها
      responses:
        '200': { description: موفق }
    post:
      summary: ایجاد کیف پول
      responses:
        '201': { description: Created }
  /iam/invitations:
    get:
      summary: لیست دعوت‌نامه‌ها
      responses:
        '200': { description: موفق }
    post:
      summary: ایجاد دعوت‌نامه
      responses:
        '201': { description: Created }
  /iam/invitations/{id}/accept:
    post:
      summary: پذیرش دعوت‌نامه
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200': { description: موفق }
  /iam/invitations/{id}/revoke:
    post:
      summary: لغو دعوت‌نامه
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200': { description: موفق }
  /iam/n8n/callback:
    post:
      summary: دریافت گزارش یا پیشنهاد از n8n
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                connector_id: { type: integer }
                idempotency_key: { type: string }
                correlation_id: { type: string }
                title: { type: string }
                severity: { type: string }
                report: { type: object }
                proposal: { type: object }
      responses:
        '200': { description: موفق }
        '401': { description: احراز هویت نامعتبر }
        '403': { description: عدم دسترسی }
        '409': { description: تکراری }
        '422': { description: داده نامعتبر }
  /iam/privilege-eligibilities:
    get:
      summary: لیست واجدین نقش ممتاز
      responses:
        '200': { description: موفق }
    post:
      summary: ایجاد واجدین نقش ممتاز
      responses:
        '201': { description: Created }
  /iam/privilege-requests:
    get:
      summary: لیست درخواست‌های نقش ممتاز
      responses:
        '200': { description: موفق }
    post:
      summary: ثبت درخواست نقش ممتاز
      responses:
        '201': { description: Created }
  /iam/privilege-requests/{id}/approve:
    post:
      summary: تایید درخواست نقش ممتاز
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200': { description: موفق }
  /iam/privilege-requests/{id}/deny:
    post:
      summary: رد درخواست نقش ممتاز
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200': { description: موفق }
  /iam/privilege-activations:
    get:
      summary: لیست فعال‌سازی نقش ممتاز
      responses:
        '200': { description: موفق }
    post:
      summary: فعال‌سازی نقش ممتاز
      responses:
        '201': { description: Created }
  /iam/privilege-activations/{id}/revoke:
    post:
      summary: لغو نقش ممتاز
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200': { description: موفق }
  /iam/impersonations/start:
    post:
      summary: شروع امپرسونیشن
      responses:
        '201': { description: Created }
  /iam/impersonations/stop:
    post:
      summary: توقف امپرسونیشن
      responses:
        '200': { description: موفق }
  /iam/sessions:
    get:
      summary: لیست نشست‌ها
      responses:
        '200': { description: موفق }
  /iam/sessions/{id}/revoke:
    post:
      summary: ابطال نشست
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200': { description: موفق }
  /iam/protected-actions/verify:
    post:
      summary: تایید عملیات حساس
      responses:
        '200': { description: موفق }
  /iam/mfa/totp/start:
    post:
      summary: شروع فعال‌سازی TOTP
      responses:
        '200': { description: موفق }
  /iam/mfa/totp/confirm:
    post:
      summary: تایید TOTP
      responses:
        '200': { description: موفق }
  /iam/mfa/totp/reset:
    post:
      summary: ریست MFA
      responses:
        '200': { description: موفق }
  /iam/scim/Users:
    get:
      summary: لیست کاربران SCIM
      responses:
        '200': { description: موفق }
    post:
      summary: ایجاد کاربر SCIM
      responses:
        '200': { description: موفق }
  /iam/scim/Users/{id}:
    patch:
      summary: ویرایش کاربر SCIM
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200': { description: موفق }
    delete:
      summary: حذف کاربر SCIM
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200': { description: موفق }
  /iam/scim/Groups:
    get:
      summary: لیست گروه‌های SCIM
      responses:
        '200': { description: موفق }
  /iam/sso/providers:
    get:
      summary: لیست ارائه‌دهندگان SSO
      responses:
        '200': { description: موفق }
  /iam/sso/oidc/callback:
    post:
      summary: کال‌بک OIDC
      responses:
        '200': { description: موفق }
  /wallets/{id}/credit:
    post:
      summary: افزایش موجودی کیف پول
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '201': { description: Created }
  /wallets/{id}/debit:
    post:
      summary: کاهش موجودی کیف پول
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '201': { description: Created }
  /wallets/transfer:
    post:
      summary: انتقال داخلی بین کیف پول‌ها
      responses:
        '201': { description: Created }
  /wallets/{id}/holds:
    post:
      summary: ایجاد هولد روی کیف پول
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '201': { description: Created }
  /transactions:
    get:
      summary: لیست تراکنش‌ها
      responses:
        '200': { description: موفق }
  /wallet-holds:
    get:
      summary: لیست هولدها
      responses:
        '200': { description: موفق }
  /wallet-holds/{id}:
    get:
      summary: نمایش هولد
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200': { description: موفق }
  /wallet-holds/{id}/capture:
    post:
      summary: تسویه هولد
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200': { description: موفق }
  /wallet-holds/{id}/release:
    post:
      summary: آزادسازی هولد
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200': { description: موفق }
  /plans:
    get:
      summary: لیست پلن‌ها
      responses:
        '200': { description: موفق }
    post:
      summary: ایجاد پلن
      responses:
        '201': { description: Created }
  /subscriptions:
    get:
      summary: لیست اشتراک‌ها
      responses:
        '200': { description: موفق }
    post:
      summary: ایجاد اشتراک
      responses:
        '201': { description: Created }
  /notifications/send:
    post:
      summary: ارسال اعلان
      responses:
        '202': { description: Accepted }
  /webhooks/notification-plugin:
    post:
      summary: وبهوک اعلان
      responses:
        '200': { description: موفق }
  /webhooks/payment-provider:
    post:
      summary: وبهوک پرداخت
      responses:
        '200': { description: OK }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-Api-Key
